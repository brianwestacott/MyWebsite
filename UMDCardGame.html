<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UMD Themed Card Matching Game - Test your memory with Bulldog pride!">
    <title>Brian Westacott - UMD Card Game | Personal Portfolio</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card-game.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Brian Westacott</a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="discover-umd.html">Discover UMD</a></li>
                <li><a href="UMDCardGame.html" class="active">Card Game</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>🐾 UMD Card Matching Game 🐾</h1>
            <p>Match the Bulldog-themed pairs to win!</p>
        </div>
    </header>

    <section class="game-section">
        <div class="container">
            <div class="game-stats">
                <div class="stat-item">Moves: <span id="moves">0</span></div>
                <div class="stat-item">Matches: <span id="matches">0 / 8</span></div>
                <div class="stat-item">Time: <span id="timer">0:00</span></div>
            </div>

            <div class="game-controls">
                <button id="resetBtn" class="btn btn-primary">New Game</button>
            </div>

            <div class="game-board" id="gameBoard">
                </div>

            <div id="winMessage" class="win-message hidden">
                <div class="win-content">
                    <h2>🎉 Go Bulldogs! 🎉</h2>
                    <p>You matched them all!</p>
                    <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Brian Westacott | MIS 2201</p>
            <p>University of Minnesota Duluth</p>
        </div>
    </footer>

    <script src="js/card-game.js"></script>
</body>
</html>
